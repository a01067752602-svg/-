<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>튼튼탐험대 🚀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'KyoboHand';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    :root { --title-font:'KyoboHand',sans-serif; --main-font:'Jua',sans-serif; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; font-family:var(--main-font); background:#04061A; overflow:hidden; }

    #star-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    .shoot { position:fixed; width:100px; height:1.5px; background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,0.85)); border-radius:2px; left:-110px; z-index:1; pointer-events:none; }
    .sh1{top:8%;  animation:sh 6s linear 1s infinite;}
    .sh2{top:20%; animation:sh 9s linear 5s infinite;}
    .sh3{top:5%;  animation:sh 7s linear 10s infinite;}
    @keyframes sh { from{transform:translateX(0) rotate(18deg);opacity:1;} to{transform:translateX(120vw) rotate(18deg);opacity:0;} }

    .fp { position:fixed; border-radius:50%; animation:floatP ease-in-out infinite; z-index:1; pointer-events:none; }
    .fp1{width:22px;height:22px;background:radial-gradient(circle at 35% 30%,#9A6AEA,#3A1A6A);top:8%; right:6%; animation-duration:5s;}
    .fp2{width:14px;height:14px;background:radial-gradient(circle at 35% 30%,#5ABAEE,#0A3A6A);top:30%;left:5%; animation-duration:7s;animation-delay:1.5s;}
    .fp3{width:18px;height:18px;background:radial-gradient(circle at 35% 30%,#EA8A5A,#6A2A1A);top:60%;right:4%; animation-duration:6s;animation-delay:3s;}
    .fp4{width:10px;height:10px;background:radial-gradient(circle at 35% 30%,#5AEA9A,#0A4A2A);top:80%;left:8%; animation-duration:8s;animation-delay:2s;}
    @keyframes floatP { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-14px) scale(1.08);} }

    .page {
      position:relative; z-index:10;
      width:100%; height:100dvh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:32px 24px;
    }

    .rocket-wrap {
      font-size:72px;
      animation:rocketBounce 2.8s ease-in-out infinite;
      filter:drop-shadow(0 0 20px rgba(120,180,255,0.6));
      margin-bottom:24px;
      line-height:1;
    }
    @keyframes rocketBounce {
      0%,100%{ transform:translateY(0) rotate(-5deg); }
      50%    { transform:translateY(-16px) rotate(5deg); }
    }

    .title {
      font-family:var(--title-font);
      font-size:clamp(30px,8vw,42px);
      color:#fff;
      text-align:center;
      line-height:1.25;
      margin-bottom:10px;
      animation:glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100%{ text-shadow:0 0 24px rgba(200,220,255,0.7),0 0 48px rgba(127,119,221,0.4); }
      50%    { text-shadow:0 0 40px rgba(255,255,255,0.95),0 0 80px rgba(127,119,221,0.7); }
    }
    .title-sub {
      font-size:15px;
      color:rgba(210,225,255,0.8);
      text-align:center;
      margin-bottom:44px;
      line-height:1.7;
    }

    .start-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; max-width:320px;
      padding:18px 28px;
      background:linear-gradient(135deg,#7F77DD 0%,#5DCAA5 100%);
      color:#fff;
      font-family:var(--title-font);
      font-size:22px;
      border:none; border-radius:20px;
      cursor:pointer;
      box-shadow:0 0 0 1px rgba(255,255,255,0.15),0 8px 32px rgba(127,119,221,0.5);
      animation:btnPulse 2.5s ease-in-out infinite;
      transition:transform 0.15s;
    }
    .start-btn:hover  { transform:scale(1.04); }
    .start-btn:active { transform:scale(0.97); }
    @keyframes btnPulse {
      0%,100%{ box-shadow:0 0 0 1px rgba(255,255,255,0.15),0 8px 32px rgba(127,119,221,0.4); }
      50%    { box-shadow:0 0 0 1px rgba(255,255,255,0.25),0 8px 40px rgba(93,202,165,0.55),0 0 0 8px rgba(127,119,221,0.12); }
    }

    .bottom-hint {
      position:fixed; bottom:28px;
      font-size:12px;
      color:rgba(180,200,255,0.4);
      text-align:center;
      animation:fadeIn 1s ease 1.5s both;
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

    body.page-out { animation:pageOut 0.4s ease forwards; }
    @keyframes pageOut { to{ opacity:0; transform:scale(0.96); } }
  </style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<div class="shoot sh1"></div>
<div class="shoot sh2"></div>
<div class="shoot sh3"></div>
<div class="fp fp1"></div>
<div class="fp fp2"></div>
<div class="fp fp3"></div>
<div class="fp fp4"></div>

<div class="page">
  <div class="rocket-wrap">🚀</div>
  <div class="title">튼튼탐험대<br>우주 출발!</div>
  <div class="title-sub">
    튼튼하고 건강한 '나' 만들기 프로젝트<br>
    🌙 우주를 향해 도전해봐요!
  </div>
  <button class="start-btn" onclick="goStart()">
    👨‍🚀 탐험 시작하기 →
  </button>
</div>

<div class="bottom-hint">튼튼탐험대 · 우주인 에디션 🛸</div>

<script>
(function(){
  var c=document.getElementById('star-canvas'),ctx=c.getContext('2d');
  var stars=[];
  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight; stars=[];
    for(var i=0;i<260;i++) stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.2,a:Math.random()*6.28,speed:Math.random()*0.4+0.05});
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(function(s){
      s.a+=s.speed*0.015;
      var alpha=0.2+Math.abs(Math.sin(s.a))*0.75;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(2)+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize); resize(); draw();
})();

function goStart(){
  document.body.classList.add('page-out');
  setTimeout(function(){ window.location.href='levelup.html'; },420);
}

var lt=0;
document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
</script>
</body>
</html>
